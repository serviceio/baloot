<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة بلوت - الغرفة الصوتية</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-bg: #16213e;
            --primary: #0f3460;
            --accent: #e94560;
            --text: #ffffff;
            --table-green: #2e7d32;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* يمنع اهتزاز الشاشة أثناء اللعب في الجوال */
        }
        
        /* شاشة الدخول (لم تتغير) */
        .login-container {
            background-color: var(--panel-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: var(--accent); margin-bottom: 20px; }
        input {
            width: 80%;
            padding: 12px;
            margin-bottom: 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #d13d56; }
        
        /* --- التصميم الجديد لشاشة الغرفة (التركيز على الجوال) --- */
        #room-screen { 
            display: none; 
            width: 100%;
            height: 100%;
            padding: 10px; 
            box-sizing: border-box;
            position: relative; /* ضروري لضبط مكان زر القائمة */
        }

        /* زر القائمة الجانبية (ثلاث شرطات) */
        .menu-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
            font-size: 20px;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* خلفية التعتيم عند فتح القائمة */
        .menu-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 998;
        }
        
        .game-layout {
            display: flex;
            height: 100%;
            max-width: 1400px;
            margin: 0 auto;
            justify-content: center;
            align-items: center;
        }

        /* اللوحة الجانبية (أصبحت قائمة منسدلة مخفية) */
        .sidebar {
            position: fixed;
            top: 0;
            right: -300px; /* مخفية خارج الشاشة لليمين */
            width: 260px;
            height: 100vh;
            background-color: var(--panel-bg);
            border-radius: 0;
            padding: 20px;
            padding-top: 70px; /* لترك مساحة للزر */
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            transition: right 0.3s ease; /* حركة الانزلاق الناعمة */
            z-index: 999;
        }
        
        /* كلاس يضاف برمجياً لفتح القائمة */
        .sidebar.open {
            right: 0; 
        }
        
        .sidebar h2 { font-size: 18px; margin-bottom: 15px; text-align: center; }
        .sidebar button { padding: 12px; font-size: 16px; margin-bottom: 10px; width: 100%; }
        
        .player-list {
            list-style: none;
            padding: 0;
            margin-top: 10px;
            display: flex;
            flex-direction: column; /* إعادة الترتيب العمودي للقائمة */
            gap: 10px;
            overflow-y: auto;
        }
        .player-item {
            background-color: var(--primary);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .status { font-size: 11px; color: #4caf50; }

        /* منطقة الطاولة الخضراء */
        .table-area {
            width: 100%;
            height: 100%;
            background-color: var(--table-green);
            border-radius: 40px; /* شكل مستطيل دائري يناسب شاشة الجوال */
            border: 6px solid #5d4037; /* حافة أنحف */
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6), 0 5px 15px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* أماكن اللاعبين مصممة خصيصاً للجوال */
        .seat {
            position: absolute;
            background-color: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 12px;
            border: 1px dashed rgba(255,255,255,0.3);
            white-space: nowrap; /* يمنع انقسام النص */
            letter-spacing: 0.5px;
        }
        .seat.bottom { bottom: 15px; left: 50%; transform: translateX(-50%); }
        .seat.top { top: 15px; left: 50%; transform: translateX(-50%); }
        
        /* الحيلة هنا: تدوير اللاعبين على اليمين واليسار لتوسعة الطاولة */
        .seat.right { right: -25px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
        .seat.left { left: -25px; top: 50%; transform: translateY(-50%) rotate(90deg); }

        /* منطقة رمي الورق في المنتصف */
        .center-board {
            width: 120px;
            height: 120px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
        }

        /* (ملاحظة: يمكنك حذف كود @media الخاص بالكمبيوتر إن أردت، لأن هذا التصميم المنسدل ممتاز لكل الشاشات) */
        @media (min-width: 768px) {
            #room-screen { padding: 20px; }
            .table-area { border-radius: 150px; border-width: 10px; max-height: 800px; max-width: 1200px; }
            .seat { padding: 10px 20px; font-size: 16px; border-radius: 20px; }
            .seat.right { right: 20px; transform: translateY(-50%); }
            .seat.left { left: 20px; transform: translateY(-50%); }
            .center-board { width: 200px; height: 200px; font-size: 18px; }
        }

        #audio-elements { display: none; } 
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div id="login-screen" class="login-container">
        <h1>🎮 غرفة البلوت</h1>
        <p>الحد الأقصى للغرفة: 8 لاعبين</p>
        <input type="text" id="player-name" placeholder="أدخل اسمك هنا...">
        <button id="join-btn">دخول الغرفة</button>
        <p id="error-msg" style="color: var(--accent); display: none; margin-top: 15px;"></p>
    </div>

    <!-- شاشة اللعب (التصميم الجديد) -->
    <div id="room-screen">
        <!-- زر القائمة والخلفية -->
        <button id="menu-toggle" class="menu-toggle">☰</button>
        <div id="menu-overlay" class="menu-overlay"></div>

        <div class="game-layout">
            
            <!-- اللوحة الجانبية (أصبحت مخفية) -->
            <div id="sidebar" class="sidebar">
                <h2 style="margin-top: 0;">الغرفة الصوتية 🎤</h2>
                <button id="mute-btn">كتم الميكروفون 🎤</button>
                <ul id="players-ul" class="player-list"></ul>
            </div>

            <!-- الطاولة -->
            <div class="table-area">
                <div class="seat top">اللاعب (مقابل)</div>
                <div class="seat right">اللاعب (يمين)</div>
                <div class="seat bottom">مقعدك (أنت)</div>
                <div class="seat left">اللاعب (يسار)</div>
                
                <div class="center-board">
                    ساحة اللعب
                </div>
            </div>

        </div>
    </div>

    <div id="audio-elements"></div>

    <!-- --- بداية كود الجافاسكريبت (منطق الصوت وقاعدة البيانات لم يتغير) --- -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, onDisconnect, push, child, remove, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // مفاتيح مشروعك (لا تقم بتغييرها)
        const firebaseConfig = {
            apiKey: "AIzaSyD3qG2s1puphlNnvCE2N8bznoHnF-cxeJw",
            authDomain: "balo-ot.firebaseapp.com",
            databaseURL: "https://balo-ot-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "balo-ot",
            storageBucket: "balo-ot.firebasestorage.app",
            messagingSenderId: "444649840040",
            appId: "1:444649840040:web:f9d8ff3dd47ef691a5119d",
            measurementId: "G-ZFVF6QQT48"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId = null;
        let myName = "";
        let localStream = null;
        let isMuted = false;
        const peers = {}; 
        const maxPlayers = 8;
        
        const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        const loginScreen = document.getElementById('login-screen');
        const roomScreen = document.getElementById('room-screen');
        const playerNameInput = document.getElementById('player-name');
        const joinBtn = document.getElementById('join-btn');
        const errorMsg = document.getElementById('error-msg');
        const playersUl = document.getElementById('players-ul');
        const muteBtn = document.getElementById('mute-btn');
        const audioElements = document.getElementById('audio-elements');

        // عناصر القائمة المنسدلة
        const menuToggle = document.getElementById('menu-toggle');
        const menuOverlay = document.getElementById('menu-overlay');
        const sidebar = document.getElementById('sidebar');

        // دوال فتح وإغلاق القائمة
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            menuOverlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        });

        menuOverlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            menuOverlay.style.display = 'none';
        });

        joinBtn.addEventListener('click', async () => {
            myName = playerNameInput.value.trim();
            if (!myName) {
                showError("الرجاء إدخال اسمك!");
                return;
            }

            joinBtn.disabled = true;
            joinBtn.innerText = "جاري التحقق...";

            const playersRef = ref(db, 'rooms/baloot/players');
            const snapshot = await get(playersRef);
            
            let currentPlayersCount = 0;
            if (snapshot.exists()) {
                currentPlayersCount = Object.keys(snapshot.val()).length;
            }

            if (currentPlayersCount >= maxPlayers) {
                showError("عذراً، الغرفة ممتلئة حالياً (8/8).");
                joinBtn.disabled = false;
                joinBtn.innerText = "دخول الغرفة";
                return;
            }

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            } catch (err) {
                showError("يجب السماح باستخدام الميكروفون للعب.");
                joinBtn.disabled = false;
                joinBtn.innerText = "دخول الغرفة";
                return;
            }

            const newPlayerRef = push(playersRef);
            myId = newPlayerRef.key;
            
            await set(newPlayerRef, {
                id: myId,
                name: myName,
                joinedAt: Date.now()
            });

            onDisconnect(newPlayerRef).remove();
            onDisconnect(ref(db, `rooms/baloot/signals/${myId}`)).remove();

            // إظهار الشاشة الجديدة (التصميم العريض)
            loginScreen.style.display = "none";
            roomScreen.style.display = "block";

            setupRoomListeners();
            setupWebRTCListeners();
        });

        muteBtn.addEventListener('click', () => {
            if (localStream) {
                isMuted = !isMuted;
                localStream.getAudioTracks()[0].enabled = !isMuted;
                muteBtn.innerText = isMuted ? "فتح الميكروفون 🔇" : "كتم الميكروفون 🎤";
                muteBtn.style.backgroundColor = isMuted ? "#7f8fa6" : "var(--accent)";
            }
        });

        function setupRoomListeners() {
            const playersRef = ref(db, 'rooms/baloot/players');
            onValue(playersRef, (snapshot) => {
                playersUl.innerHTML = "";
                if (snapshot.exists()) {
                    const players = snapshot.val();
                    Object.values(players).forEach(player => {
                        const li = document.createElement('li');
                        li.className = 'player-item';
                        li.innerHTML = `
                            <span>${player.name} ${player.id === myId ? '(أنت)' : ''}</span>
                            <span class="status">متصل 🟢</span>
                        `;
                        playersUl.appendChild(li);
                    });
                }
            });
        }

        function setupWebRTCListeners() {
            const playersRef = ref(db, 'rooms/baloot/players');
            onChildAdded(playersRef, (snapshot) => {
                const remotePlayer = snapshot.val();
                if (remotePlayer.id !== myId && myId > remotePlayer.id) {
                    initiateCall(remotePlayer.id);
                }
            });

            const signalsRef = ref(db, `rooms/baloot/signals/${myId}`);
            onChildAdded(signalsRef, async (snapshot) => {
                const data = snapshot.val();
                const signalKey = snapshot.key;
                const senderId = data.sender;

                if (!peers[senderId]) {
                    createPeerConnection(senderId);
                }

                const pc = peers[senderId];

                try {
                    if (data.type === 'offer') {
                        await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                        const answer = await pc.createAnswer();
                        await pc.setLocalDescription(answer);
                        sendSignal(senderId, { type: 'answer', answer: answer });
                    } else if (data.type === 'answer') {
                        await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    } else if (data.type === 'ice' && data.ice && data.ice.candidate) {
                        await pc.addIceCandidate(new RTCIceCandidate(data.ice));
                    }
                } catch (error) {
                    console.warn("تم تجاهل خطأ في الاتصال:", error);
                }

                remove(ref(db, `rooms/baloot/signals/${myId}/${signalKey}`));
            });
        }

        function createPeerConnection(remoteId) {
            const pc = new RTCPeerConnection(rtcConfig);
            peers[remoteId] = pc;

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.ontrack = (event) => {
                let audioElement = document.getElementById(`audio-${remoteId}`);
                if (!audioElement) {
                    audioElement = document.createElement('audio');
                    audioElement.id = `audio-${remoteId}`;
                    audioElement.autoplay = true;
                    audioElement.playsInline = true; 
                    audioElements.appendChild(audioElement);
                }
                audioElement.srcObject = event.streams[0];
                
                setTimeout(() => {
                    audioElement.play().catch(error => {
                        console.warn("تأكد من عدم وجود كتم تلقائي للصوت:", error);
                    });
                }, 500);
            };

            pc.onicecandidate = (event) => {
                if (event.candidate && event.candidate.candidate) {
                    sendSignal(remoteId, { 
                        type: 'ice', 
                        ice: {
                            candidate: event.candidate.candidate,
                            sdpMid: event.candidate.sdpMid,
                            sdpMLineIndex: event.candidate.sdpMLineIndex
                        }
                    });
                }
            };

            return pc;
        }

        async function initiateCall(remoteId) {
            const pc = createPeerConnection(remoteId);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            sendSignal(remoteId, { type: 'offer', offer: offer });
        }

        function sendSignal(targetId, payload) {
            const signalRef = ref(db, `rooms/baloot/signals/${targetId}`);
            payload.sender = myId;
            push(signalRef, payload);
        }

        function showError(msg) {
            errorMsg.innerText = msg;
            errorMsg.style.display = "block";
            setTimeout(() => { errorMsg.style.display = "none"; }, 5000);
        }
    </script>
</body>
</html>
