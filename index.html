<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة بلوت - الغرفة الصوتية</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-bg: #16213e;
            --primary: #0f3460;
            --accent: #e94560;
            --text: #ffffff;
            --table-green: #2e7d32;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            height: 100vh;
            height: 100dvh; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }
        
        .login-container {
            background-color: var(--panel-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: var(--accent); margin-bottom: 20px; }
        input {
            width: 80%;
            padding: 12px;
            margin-bottom: 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #d13d56; }
        
        #room-screen { 
            display: none; 
            width: 100%;
            height: 100%;
            padding: 70px 10px 20px 10px; 
            box-sizing: border-box;
            position: relative; 
        }

        #game-msg {
            display: none;
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 10px 20px;
            border-radius: 20px;
            color: #f1c40f;
            z-index: 100;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            border: 1px solid #f1c40f;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        /* مؤشر الدور والموزع */
        .turn-indicator {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
            color: #fff;
            z-index: 50;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .menu-toggle {
            position: absolute;
            top: max(15px, env(safe-area-inset-top)); 
            right: max(15px, env(safe-area-inset-right));
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
            font-size: 20px;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .menu-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 998;
        }
        
        .game-layout {
            display: flex;
            height: 100%;
            max-width: 1400px;
            margin: 0 auto;
            justify-content: center;
            align-items: center;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -300px; 
            width: 260px;
            height: 100vh;
            background-color: var(--panel-bg);
            border-radius: 0;
            padding: 20px;
            padding-top: 70px; 
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            transition: right 0.3s ease; 
            z-index: 999;
        }
        
        .sidebar.open { right: 0; }
        .sidebar h2 { font-size: 18px; margin-bottom: 15px; text-align: center; }
        .sidebar button { padding: 12px; font-size: 16px; margin-bottom: 10px; width: 100%; }
        
        .player-list {
            list-style: none;
            padding: 0;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }
        .player-item {
            background-color: var(--primary);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .status { font-size: 11px; color: #4caf50; }

        .table-area {
            width: 100%;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 1 / 1; 
            margin: auto; 
            background-color: var(--table-green);
            border-radius: 30px; 
            border: 6px solid #5d4037; 
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6), 0 5px 15px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .seat {
            position: absolute;
            background-color: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 12px;
            border: 1px dashed rgba(255,255,255,0.3);
            white-space: nowrap; 
            letter-spacing: 0.5px;
            z-index: 5;
            transition: border-color 0.3s;
        }
        /* إبراز من عليه الدور */
        .seat.active-turn { border: 2px solid #f1c40f; background-color: rgba(241, 196, 15, 0.2); }
        .seat.dealer { border: 2px solid #e74c3c; } /* الموزع بالأحمر */

        .seat.bottom { bottom: 15px; left: 50%; transform: translateX(-50%); }
        .seat.top { top: 15px; left: 50%; transform: translateX(-50%); }
        .seat.right { right: -15px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
        .seat.left { left: -15px; top: 50%; transform: translateY(-50%) rotate(90deg); }

        .center-board {
            width: 180px; 
            height: 180px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 10px;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            z-index: 10;
        }
        
        #deal-btn {
            background-color: #f39c12;
            padding: 8px 12px;
            font-size: 12px;
            border-radius: 6px;
            display: none; 
        }
        #deal-btn:hover { background-color: #e67e22; }

        .buy-card-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .bidding-controls {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            width: 160px;
        }
        
        .bid-btn {
            padding: 5px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            flex: 1 1 40%; 
        }
        .btn-sun { background-color: #f1c40f; color: black; }
        .btn-hokm { background-color: #e74c3c; }
        .btn-pass { background-color: #7f8c8d; }
        .btn-ashkal { background-color: #2980b9; }
        .btn-qablak { background-color: #9b59b6; }
        
        .suit-btn { font-size: 18px; padding: 5px; margin: 2px; flex: 1; }
        .suit-btn.red { color: #e74c3c; }
        .suit-btn.black { color: black; }

        .my-hand {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: -15px; 
            z-index: 20;
        }
        
        .card {
            width: 35px;
            height: 55px;
            background-color: white;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            color: black;
            box-shadow: -2px 2px 5px rgba(0,0,0,0.4);
            border: 1px solid #ccc;
            margin-left: -10px; 
        }
        .card.center-card {
            transform: scale(1.2); 
            margin-left: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }
        .card:first-child { margin-left: 0; }
        .card.red { color: #e74c3c; }

        @media (min-width: 768px) {
            #room-screen { padding: 20px; }
            .table-area { border-radius: 150px; border-width: 10px; max-height: 800px; max-width: 1200px; }
            .seat { padding: 10px 20px; font-size: 16px; border-radius: 20px; }
            .seat.right { right: 20px; transform: translateY(-50%); }
            .seat.left { left: 20px; transform: translateY(-50%); }
            .center-board { width: 200px; height: 200px; font-size: 18px; }
            .card { width: 50px; height: 75px; font-size: 18px; margin-left: -15px; }
            .my-hand { bottom: 70px; }
            .bidding-controls { width: 200px; gap: 10px; }
            .bid-btn { padding: 8px 15px; font-size: 14px; }
        }

        #audio-elements { display: none; } 
    </style>
</head>
<body>

    <div id="login-screen" class="login-container">
        <h1>🎮 غرفة البلوت</h1>
        <p>الحد الأقصى للغرفة: 8 لاعبين</p>
        <input type="text" id="player-name" placeholder="أدخل اسمك هنا...">
        <button id="join-btn">دخول الغرفة</button>
        <p id="error-msg" style="color: var(--accent); display: none; margin-top: 15px;"></p>
    </div>

    <div id="room-screen">
        <div id="turn-indicator" class="turn-indicator" style="display: none;">بانتظار بدء اللعبة...</div>
        <div id="game-msg"></div>

        <button id="menu-toggle" class="menu-toggle">☰</button>
        <div id="menu-overlay" class="menu-overlay"></div>

        <div class="game-layout">
            <div id="sidebar" class="sidebar">
                <h2 style="margin-top: 0;">الغرفة الصوتية 🎤</h2>
                <button id="mute-btn">كتم الميكروفون 🎤</button>
                <ul id="players-ul" class="player-list"></ul>
            </div>

            <div class="table-area">
                <div id="seat-top" class="seat top">اللاعب (مقابل)</div>
                <div id="seat-right" class="seat right">اللاعب (يمين)</div>
                <div id="seat-bottom" class="seat bottom">مقعدك (أنت)</div>
                <div id="seat-left" class="seat left">اللاعب (يسار)</div>
                
                <div class="center-board" id="center-board">
                    ساحة اللعب
                    <button id="deal-btn">توزيع الأوراق</button>
                </div>
                
                <div id="my-hand" class="my-hand"></div>
            </div>
        </div>
    </div>

    <div id="audio-elements"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, onDisconnect, push, child, remove, onChildAdded, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3qG2s1puphlNnvCE2N8bznoHnF-cxeJw",
            authDomain: "balo-ot.firebaseapp.com",
            databaseURL: "https://balo-ot-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "balo-ot",
            storageBucket: "balo-ot.firebasestorage.app",
            messagingSenderId: "444649840040",
            appId: "1:444649840040:web:f9d8ff3dd47ef691a5119d",
            measurementId: "G-ZFVF6QQT48"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId = null;
        let myName = "";
        let localStream = null;
        let isMuted = false;
        let gameState = null;
        let myPlayerIndex = -1;
        const peers = {}; 
        const maxPlayers = 8;
        
        const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        const loginScreen = document.getElementById('login-screen');
        const roomScreen = document.getElementById('room-screen');
        const playerNameInput = document.getElementById('player-name');
        const joinBtn = document.getElementById('join-btn');
        const errorMsg = document.getElementById('error-msg');
        const playersUl = document.getElementById('players-ul');
        const muteBtn = document.getElementById('mute-btn');
        const audioElements = document.getElementById('audio-elements');
        const dealBtn = document.getElementById('deal-btn');
        const myHandDiv = document.getElementById('my-hand');
        const gameMsgDiv = document.getElementById('game-msg');
        const turnIndicator = document.getElementById('turn-indicator');
        const centerBoard = document.getElementById('center-board');

        const menuToggle = document.getElementById('menu-toggle');
        const menuOverlay = document.getElementById('menu-overlay');
        const sidebar = document.getElementById('sidebar');

        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            menuOverlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        });

        menuOverlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            menuOverlay.style.display = 'none';
        });

        joinBtn.addEventListener('click', async () => {
            myName = playerNameInput.value.trim();
            if (!myName) {
                showError("الرجاء إدخال اسمك!"); return;
            }

            joinBtn.disabled = true; joinBtn.innerText = "جاري التحقق...";
            const playersRef = ref(db, 'rooms/baloot/players');
            const snapshot = await get(playersRef);
            
            if (snapshot.exists() && Object.keys(snapshot.val()).length >= maxPlayers) {
                showError("عذراً، الغرفة ممتلئة حالياً (8/8).");
                joinBtn.disabled = false; joinBtn.innerText = "دخول الغرفة"; return;
            }

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            } catch (err) {
                showError("يجب السماح باستخدام الميكروفون للعب.");
                joinBtn.disabled = false; joinBtn.innerText = "دخول الغرفة"; return;
            }

            const newPlayerRef = push(playersRef);
            myId = newPlayerRef.key;
            
            await set(newPlayerRef, { id: myId, name: myName, joinedAt: Date.now() });

            onDisconnect(newPlayerRef).remove();
            onDisconnect(ref(db, `rooms/baloot/signals/${myId}`)).remove();

            loginScreen.style.display = "none";
            roomScreen.style.display = "block";
            turnIndicator.style.display = "block";

            setupRoomListeners();
            setupWebRTCListeners();
            setupGameListeners(); 
        });

        // ==========================================
        // محرك البلوت (البلوت انجن) والتوزيع
        // ==========================================
        dealBtn.addEventListener('click', async () => {
            const playersSnapshot = await get(ref(db, 'rooms/baloot/players'));
            if (!playersSnapshot.exists()) return;
            
            const players = playersSnapshot.val();
            // أخذ أول 4 لاعبين كلاعبين أساسيين (حسب وقت الانضمام)
            const activePlayers = Object.values(players)
                .sort((a,b) => a.joinedAt - b.joinedAt)
                .slice(0, 4)
                .map(p => p.id);
            
            if (activePlayers.length < 4) {
                showGameMessage("نحتاج 4 لاعبين على الأقل لبدء البلوت!");
                return;
            }

            // تحديد الموزع الجديد (تدوير عكس عقارب الساعة)
            const oldStateSnapshot = await get(ref(db, 'rooms/baloot/gameState'));
            let nextDealer = 0;
            if (oldStateSnapshot.exists() && oldStateSnapshot.val().dealerIndex !== undefined) {
                nextDealer = (oldStateSnapshot.val().dealerIndex + 1) % 4; // موزع جديد
            }

            // اللعب يبدأ من يمين الموزع (+1 عكس عقارب الساعة)
            const firstTurn = (nextDealer + 1) % 4;

            let deck = [];
            const suits = ['♠', '♥', '♦', '♣'];
            const values = ['7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
            for (let suit of suits) { for (let value of values) deck.push({ suit, value }); }
            
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }

            const hands = {};
            activePlayers.forEach(id => { hands[id] = deck.splice(0, 5); });
            const buyCard = deck.shift();

            await set(ref(db, 'rooms/baloot/gameState'), {
                activePlayers: activePlayers,
                dealerIndex: nextDealer,
                turnIndex: firstTurn,
                round: 1, // اللفة الأولى
                phase: 'bidding', // مرحلة الشراء
                passes: 0,
                buyCard: buyCard,
                hands: hands,
                deckRest: deck,
                currentBid: null,
                contestAnswers: {}
            });
        });

        // ==========================================
        // الاستماع لحالة اللعبة والمزاد
        // ==========================================
        function setupGameListeners() {
            const gameStateRef = ref(db, 'rooms/baloot/gameState');
            onValue(gameStateRef, (snapshot) => {
                if (!snapshot.exists()) {
                    dealBtn.style.display = 'block';
                    return;
                }
                gameState = snapshot.val();
                myPlayerIndex = gameState.activePlayers ? gameState.activePlayers.indexOf(myId) : -1;
                
                // تحديث الأوراق
                if (gameState.hands && gameState.hands[myId]) renderMyHand(gameState.hands[myId]);
                
                updateSeatsUI();
                processGameState();
            });
        }

        // تحديث معلومات الجالسين وتحديد الموزع
        function updateSeatsUI() {
            if (!gameState.activePlayers || myPlayerIndex === -1) return;
            // ترتيب المقاعد: أسفل(أنت)، يمين(+1)، أعلى(+2)، يسار(+3) عكس عقارب الساعة
            const positions = [
                { id: 'seat-bottom', offset: 0 },
                { id: 'seat-right', offset: 1 },
                { id: 'seat-top', offset: 2 },
                { id: 'seat-left', offset: 3 }
            ];

            positions.forEach(pos => {
                const targetIndex = (myPlayerIndex + pos.offset) % 4;
                const targetPlayerId = gameState.activePlayers[targetIndex];
                const el = document.getElementById(pos.id);
                
                // جلب اسم اللاعب
                get(ref(db, `rooms/baloot/players/${targetPlayerId}`)).then(snap => {
                    let name = snap.exists() ? snap.val().name : 'لاعب';
                    if (pos.offset === 0) name += " (أنت)";
                    el.innerText = name;
                });

                // تلوين من عليه الدور
                if (gameState.turnIndex === targetIndex && gameState.phase === 'bidding') {
                    el.classList.add('active-turn');
                } else {
                    el.classList.remove('active-turn');
                }
                
                // تلوين الموزع
                if (gameState.dealerIndex === targetIndex) {
                    el.classList.add('dealer');
                } else {
                    el.classList.remove('dealer');
                }
            });
        }

        // معالجة حالة اللعبة والمزاد
        function processGameState() {
            dealBtn.style.display = 'none';
            centerBoard.innerHTML = 'ساحة اللعب';

            if (!gameState.activePlayers || myPlayerIndex === -1) return; // متفرج
            
            const isMyTurn = gameState.turnIndex === myPlayerIndex;
            const isDealer = gameState.dealerIndex === myPlayerIndex;

            // إظهار من عليه الدور في الأعلى
            if (gameState.phase === 'bidding') {
                if (isMyTurn) {
                    turnIndicator.innerText = `دورك الآن (اللفة ${gameState.round})`;
                    turnIndicator.style.backgroundColor = 'rgba(231, 76, 60, 0.8)';
                } else {
                    turnIndicator.innerText = `بانتظار قرار اللاعب... (اللفة ${gameState.round})`;
                    turnIndicator.style.backgroundColor = 'rgba(255, 255, 255, 0.1)';
                }
            }

            // عرض ورقة المشترى
            if (gameState.buyCard && gameState.phase !== 'playing') {
                const isRed = gameState.buyCard.suit === '♥' || gameState.buyCard.suit === '♦';
                let html = `
                    <div class="buy-card-container">
                        <div class="card center-card ${isRed ? 'red' : ''}">
                            <span>${gameState.buyCard.value}</span><span>${gameState.buyCard.suit}</span>
                        </div>
                        <div id="bidding-controls" class="bidding-controls"></div>
                    </div>`;
                centerBoard.innerHTML = html;
            }

            const controlsDiv = document.getElementById('bidding-controls');
            if (!controlsDiv) return;

            // --- 1. مرحلة المزاد العادية ---
            if (gameState.phase === 'bidding' && isMyTurn) {
                if (gameState.round === 1) {
                    controlsDiv.innerHTML = `
                        <button class="bid-btn btn-sun" onclick="submitBid('صن')">صن</button>
                        <button class="bid-btn btn-hokm" onclick="submitBid('حكم', '${gameState.buyCard.suit}')">حكم</button>
                        <button class="bid-btn btn-ashkal" onclick="submitBid('صن')">أشكل</button>
                        <button class="bid-btn btn-pass" onclick="submitBid('بس')">بس</button>
                    `;
                } else if (gameState.round === 2) {
                    controlsDiv.innerHTML = `
                        <button class="bid-btn btn-sun" onclick="submitBid('صن')">صن</button>
                        <button class="bid-btn btn-hokm" onclick="showHokmThaniMenu()">حكم ثاني</button>
                        <button class="bid-btn btn-pass" onclick="submitBid('بس')">بس</button>
                    `;
                }
            } 
            // --- 2. مرحلة المعارضة (صن يطير الحكم، أو قبلك) ---
            else if (gameState.phase === 'contesting' && gameState.currentBid) {
                const bidderIndex = gameState.activePlayers.indexOf(gameState.currentBid.playerId);
                const hasAnswered = gameState.contestAnswers && gameState.contestAnswers[myId];

                if (myPlayerIndex !== bidderIndex && !hasAnswered) {
                    turnIndicator.innerText = `اللاعب اختار ${gameState.currentBid.decision}، هل توافق؟`;
                    
                    if (gameState.currentBid.decision === 'حكم') {
                        // أي شخص يمكنه شراء صن ليطير الحكم
                        controlsDiv.innerHTML = `
                            <button class="bid-btn btn-sun" onclick="submitContest('صن')">صن (يطير)</button>
                            <button class="bid-btn btn-pass" onclick="submitContest('موافق')">موافق</button>
                        `;
                    } else if (gameState.currentBid.decision === 'صن') {
                        // حساب من يحق له قول (قبلك)
                        // المقياس: المسافة من الموزع. (الموزع+1 هو الأقرب، ثم +2، ثم +3)
                        const getDistance = (idx) => (idx - gameState.dealerIndex + 4) % 4 || 4; 
                        const myDistance = getDistance(myPlayerIndex);
                        const bidderDistance = getDistance(bidderIndex);

                        // إذا مسافتي أقل من مسافته، فأنا جالس قبله ويحق لي أخذه
                        if (myDistance < bidderDistance) {
                            controlsDiv.innerHTML = `
                                <button class="bid-btn btn-qablak" onclick="submitContest('صن')">قبلك!</button>
                                <button class="bid-btn btn-pass" onclick="submitContest('موافق')">موافق</button>
                            `;
                        } else {
                            controlsDiv.innerHTML = `<button class="bid-btn btn-pass" onclick="submitContest('موافق')">موافق</button>`;
                        }
                    }
                } else {
                    controlsDiv.innerHTML = '';
                    turnIndicator.innerText = `جاري انتظار موافقة البقية...`;
                }
            }
        }

        // دوال إرسال قرار المزاد لقاعدة البيانات جعلناها Window لتصلها أزرار HTML
        window.submitBid = async function(decision, suit = null) {
            const updates = {};
            
            if (decision === 'بس') {
                showGameMessage(`${myName} قال: بس`);
                let nextTurn = (gameState.turnIndex + 1) % 4;
                let newPasses = (gameState.passes || 0) + 1;
                
                if (newPasses >= 4) { // الجميع قال بس
                    if (gameState.round === 1) {
                        // الانتقال للفة الثانية، الدور يعود ليمين الموزع
                        updates['rooms/baloot/gameState/round'] = 2;
                        updates['rooms/baloot/gameState/passes'] = 0;
                        updates['rooms/baloot/gameState/turnIndex'] = (gameState.dealerIndex + 1) % 4;
                    } else {
                        // الجميع بس في الدورة الثانية -> إنهاء وتوزيع جديد
                        showGameMessage("لم يشتري أحد، سيتم إعادة التوزيع...");
                        remove(ref(db, 'rooms/baloot/gameState'));
                        return;
                    }
                } else {
                    updates['rooms/baloot/gameState/turnIndex'] = nextTurn;
                    updates['rooms/baloot/gameState/passes'] = newPasses;
                }
            } else {
                // اشترى صن أو حكم
                showGameMessage(`${myName} اشترى: ${decision}`);
                updates['rooms/baloot/gameState/phase'] = 'contesting';
                updates['rooms/baloot/gameState/currentBid'] = { playerId: myId, playerName: myName, decision: decision, suit: suit };
                updates['rooms/baloot/gameState/contestAnswers'] = null; // تصفير الموافقات
            }
            
            await update(ref(db), updates);
        };

        // إظهار خيارات "حكم ثاني" (الأشكال ما عدا المرفوض)
        window.showHokmThaniMenu = function() {
            const controlsDiv = document.getElementById('bidding-controls');
            const rejectedSuit = gameState.buyCard.suit;
            const suits = [
                { s: '♠', c: 'black' }, { s: '♣', c: 'black' },
                { s: '♥', c: 'red' }, { s: '♦', c: 'red' }
            ];
            
            let html = `<div style="display:flex; gap:10px; background:#fff; border-radius:5px; padding:5px;">`;
            suits.forEach(st => {
                if (st.s !== rejectedSuit) {
                    html += `<button class="suit-btn ${st.c}" onclick="submitBid('حكم', '${st.s}')">${st.s}</button>`;
                }
            });
            html += `<button onclick="processGameState()" style="background:gray; color:white; border:none; padding:5px; cursor:pointer;">إلغاء</button></div>`;
            controlsDiv.innerHTML = html;
        };

        // الرد على المعارضة (صن، أو قبلك، أو موافق)
        window.submitContest = async function(response) {
            if (response === 'موافق') {
                // تسجيل الموافقة
                await set(ref(db, `rooms/baloot/gameState/contestAnswers/${myId}`), true);
                
                // تحقق هل الجميع وافق (3 لاعبين غير المشتري)
                const stateSnap = await get(ref(db, 'rooms/baloot/gameState'));
                const currentState = stateSnap.val();
                if (currentState.contestAnswers && Object.keys(currentState.contestAnswers).length >= 3) {
                    showGameMessage(`تم اعتماد الشراء لـ ${currentState.currentBid.playerName} (${currentState.currentBid.decision})`);
                    // الانتقال لمرحلة اللعب وتوزيع باقي الورق (سيتم برمجتها لاحقاً)
                    await update(ref(db), { 'rooms/baloot/gameState/phase': 'playing' });
                }
            } else if (response === 'صن') {
                // عارض الحكم واشترى صن، أو قال قبلك
                showGameMessage(`${myName} عارض واشترى: صن!`);
                const updates = {};
                updates['rooms/baloot/gameState/currentBid'] = { playerId: myId, playerName: myName, decision: 'صن' };
                updates['rooms/baloot/gameState/contestAnswers'] = null; // إعادة المزاد لمن قبله
                await update(ref(db), updates);
            }
        };

        function showGameMessage(msg) {
            gameMsgDiv.innerText = msg;
            gameMsgDiv.style.display = "block";
            setTimeout(() => { gameMsgDiv.style.display = "none"; }, 4000);
        }

        // ==========================================
        // باقي دوال العرض والصوت (نفسها بدون تغيير)
        // ==========================================
        function renderMyHand(cards) {
            myHandDiv.innerHTML = '';
            const suitOrder = { '♠': 1, '♥': 2, '♣': 3, '♦': 4 };
            const valueOrder = { 'A': 8, '10': 7, 'K': 6, 'Q': 5, 'J': 4, '9': 3, '8': 2, '7': 1 };
            
            cards.sort((a, b) => {
                if (suitOrder[a.suit] !== suitOrder[b.suit]) return suitOrder[a.suit] - suitOrder[b.suit];
                return valueOrder[b.value] - valueOrder[a.value];
            });

            cards.forEach(card => {
                const cardEl = document.createElement('div');
                const isRed = card.suit === '♥' || card.suit === '♦';
                cardEl.className = 'card' + (isRed ? ' red' : '');
                cardEl.innerHTML = `<span>${card.value}</span><span>${card.suit}</span>`;
                myHandDiv.appendChild(cardEl);
            });
        }

        muteBtn.addEventListener('click', () => {
            if (localStream) {
                isMuted = !isMuted;
                localStream.getAudioTracks()[0].enabled = !isMuted;
                muteBtn.innerText = isMuted ? "فتح الميكروفون 🔇" : "كتم الميكروفون 🎤";
                muteBtn.style.backgroundColor = isMuted ? "#7f8fa6" : "var(--accent)";
            }
        });

        function setupRoomListeners() {
            const playersRef = ref(db, 'rooms/baloot/players');
            onValue(playersRef, (snapshot) => {
                playersUl.innerHTML = "";
                if (snapshot.exists()) {
                    const players = snapshot.val();
                    Object.values(players).forEach(player => {
                        const li = document.createElement('li');
                        li.className = 'player-item';
                        li.innerHTML = `<span>${player.name}</span><span class="status">متصل 🟢</span>`;
                        playersUl.appendChild(li);
                    });
                }
            });
        }

        function setupWebRTCListeners() {
            const playersRef = ref(db, 'rooms/baloot/players');
            onChildAdded(playersRef, (snapshot) => {
                const remotePlayer = snapshot.val();
                if (remotePlayer.id !== myId && myId > remotePlayer.id) initiateCall(remotePlayer.id);
            });

            const signalsRef = ref(db, `rooms/baloot/signals/${myId}`);
            onChildAdded(signalsRef, async (snapshot) => {
                const data = snapshot.val();
                const signalKey = snapshot.key;
                const senderId = data.sender;

                if (!peers[senderId]) createPeerConnection(senderId);
                const pc = peers[senderId];

                try {
                    if (data.type === 'offer') {
                        await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                        const answer = await pc.createAnswer();
                        await pc.setLocalDescription(answer);
                        sendSignal(senderId, { type: 'answer', answer: answer });
                    } else if (data.type === 'answer') {
                        await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    } else if (data.type === 'ice' && data.ice && data.ice.candidate) {
                        await pc.addIceCandidate(new RTCIceCandidate(data.ice));
                    }
                } catch (error) { console.warn("تجاهل خطأ اتصال:", error); }

                remove(ref(db, `rooms/baloot/signals/${myId}/${signalKey}`));
            });
        }

        function createPeerConnection(remoteId) {
            const pc = new RTCPeerConnection(rtcConfig);
            peers[remoteId] = pc;
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.ontrack = (event) => {
                let audioElement = document.getElementById(`audio-${remoteId}`);
                if (!audioElement) {
                    audioElement = document.createElement('audio');
                    audioElement.id = `audio-${remoteId}`;
                    audioElement.autoplay = true;
                    audioElement.playsInline = true; 
                    audioElements.appendChild(audioElement);
                }
                audioElement.srcObject = event.streams[0];
                setTimeout(() => { audioElement.play().catch(e=>console.warn(e)); }, 500);
            };

            pc.onicecandidate = (event) => {
                if (event.candidate && event.candidate.candidate) {
                    sendSignal(remoteId, { 
                        type: 'ice', 
                        ice: { candidate: event.candidate.candidate, sdpMid: event.candidate.sdpMid, sdpMLineIndex: event.candidate.sdpMLineIndex }
                    });
                }
            };
            return pc;
        }

        async function initiateCall(remoteId) {
            const pc = createPeerConnection(remoteId);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            sendSignal(remoteId, { type: 'offer', offer: offer });
        }

        function sendSignal(targetId, payload) {
            const signalRef = ref(db, `rooms/baloot/signals/${targetId}`);
            payload.sender = myId;
            push(signalRef, payload);
        }

        function showError(msg) {
            const errorMsg = document.getElementById('error-msg');
            errorMsg.innerText = msg;
            errorMsg.style.display = "block";
            setTimeout(() => { errorMsg.style.display = "none"; }, 5000);
        }
    </script>
</body>
